<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 420" role="img" aria-labelledby="title desc">
  <title id="title">AI Project Starter banner</title>
  <desc id="desc">A planning workflow showing brief, product requirements, architecture, agent rules, and quality gates.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="420" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0F172A"/>
      <stop offset="0.45" stop-color="#164E63"/>
      <stop offset="1" stop-color="#0F766E"/>
    </linearGradient>
